name: CI

on:
  push:
  pull_request:
    branches: [ develop, main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Run backend tests
      run: mvn test
      working-directory: backend