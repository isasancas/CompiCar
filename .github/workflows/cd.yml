name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      working-directory: backend

    - name: Install Koyeb CLI
      run: curl -fsSL https://github.com/koyeb/koyeb-cli/releases/latest/download/install.sh | sh

    - name: Deploy to Koyeb
      run: koyeb services update ${{ secrets.KOYEB_SERVICE_NAME }} --app ${{ secrets.KOYEB_APP_NAME }} --jar backend/target/*.jar --port 8080
      env:
        KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
