name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      working-directory: backend

    - name: Deploy to Koyeb
      uses: koyeb/action-deploy@v1
      with:
        api-token: ${{ secrets.KOYEB_API_TOKEN }}
        app-name: ${{ secrets.KOYEB_APP_NAME }}
        service-name: ${{ secrets.KOYEB_SERVICE_NAME }}
        type: jar
        jar-path: backend/target/*.jar
        port: 8080
