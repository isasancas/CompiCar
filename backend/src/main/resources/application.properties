spring.application.name=backend

# Puerto dinámico para Koyeb (8080 por defecto)
server.port=${PORT:8080}

# Configuración de Conexión a Neon
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:neondb}?sslmode=require
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Configuración de Flyway (ya que lo tienes en el pom.xml)
spring.flyway.baseline-on-migrate=true